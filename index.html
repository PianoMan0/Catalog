<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Catalog</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="A visual catalog of all my books!">
        <meta name="author" content="PianoMan0">
        <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
        <style>
            html,body{height:100%;margin:0}
            body { background-color: aquamarine; font-family: Arial, Helvetica, sans-serif; }
            .ui {
                position: absolute; left: 12px; top: 12px; z-index: 10; display:flex; gap:8px; align-items:center;
            }
            .search {
                padding:8px 10px; font-size:16px; border-radius:6px; border:1px solid #666; width:260px;
            }
            .hint { background: rgba(255,255,255,0.9); padding:6px 8px; border-radius:6px; }
            .list { position:absolute; right:12px; top:12px; z-index:10; max-height:70vh; overflow:auto; background:rgba(255,255,255,0.9); padding:8px; border-radius:6px; }
            .list-item { margin:4px 0; font-size:14px; }
        </style>
    </head>
    <body>

        <div class="ui">
            <input id="search" class="search" placeholder="Search books by title..." />
            <div class="hint">Type to filter visible books</div>
        </div>

        <div id="list" class="list" aria-live="polite"></div>

        <a-scene embedded background="color: #a8f0e6">
            <a-assets id="assets"></a-assets>

            <a-entity id="cam" camera look-controls position="0 1.6 4">
                <a-entity cursor="fuse: false; rayOrigin:mouse" raycaster="objects: .clickable" position="0 0 -1" geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02" material="color: black; shader: flat"></a-entity>
            </a-entity>

            <a-entity id="books-root"></a-entity>
        </a-scene>

        <script>
            const books = [
                { id: 'encyclopedia', title: 'Marvel Encyclopedia', file: 'covers/encyclopedia.jpeg' },
                { id: 'universe', title: 'How the Universe Works', file: 'covers/how_universe.jpeg' },
                { id: 'allforone', title: 'All For One', file: 'covers/all_for_one.jpeg' },
                { id: 'guiness', title: 'Guinness Book of World Records 2021', file: 'covers/guiness.jpeg' },
                { id: 'dodgers', title: 'The Los Angeles Dodgers Encyclopedia', file: 'covers/dodgers.jpeg' }

            ];

            const assets = document.getElementById('assets');
            const root = document.getElementById('books-root');

            books.forEach(b => {
                const img = document.createElement('img');
                img.id = b.id + '-img';
                img.src = b.file;
                img.alt = b.title + ' cover';
                assets.appendChild(img);
            });

            function createBookEntity(book, position) {
                const ent = document.createElement('a-entity');
                ent.setAttribute('class', 'book clickable');
                ent.setAttribute('position', `${position.x} ${position.y} ${position.z}`);
                ent.setAttribute('data-title', book.title.toLowerCase());

                const spine = document.createElement('a-box');
                spine.setAttribute('depth', '0.2');
                spine.setAttribute('height', '1.4');
                spine.setAttribute('width', '0.18');
                spine.setAttribute('color', '#222');
                spine.setAttribute('position', '0 0 0');
                ent.appendChild(spine);

                const cover = document.createElement('a-plane');
                cover.setAttribute('height', '1.4');
                cover.setAttribute('width', '0.9');
                cover.setAttribute('position', `0 0 ${0.11}`);
                cover.setAttribute('rotation', '0 0 0');
                cover.setAttribute('material', `src: #${book.id}-img; side:double`);
                ent.appendChild(cover);

                const label = document.createElement('a-text');
                label.setAttribute('value', book.title);
                label.setAttribute('align', 'center');
                label.setAttribute('width', '2.5');
                label.setAttribute('position', '0 -0.95 0');
                label.setAttribute('rotation', '0 0 0');
                ent.appendChild(label);

                ent.addEventListener('mouseenter', () => { spine.setAttribute('color', '#444'); });
                ent.addEventListener('mouseleave', () => { spine.setAttribute('color', '#222'); });
                ent.addEventListener('click', () => {
                    const cam = document.getElementById('cam');
                    const wp = new THREE.Vector3();
                    ent.object3D.getWorldPosition(wp);
                    const toX = wp.x;
                    const toY = wp.y + 0.6;
                    const toZ = wp.z + 1.2;
                    cam.setAttribute('animation__move', `property: position; to: ${toX} ${toY} ${toZ}; dur: 600; easing: easeInOutQuad`);
                });

                return ent;
            }

            function layoutBooks() {
                const spacing = 2;
                const startX = -((books.length - 1) * spacing) / 2;
                books.forEach((b, i) => {
                    const pos = { x: startX + i * spacing, y: 1.0, z: -2 };
                    const e = createBookEntity(b, pos);
                    e.id = 'book-' + b.id;
                    root.appendChild(e);
                });
            }

            layoutBooks();

            function renderList(items) {
                const list = document.getElementById('list');
                list.innerHTML = '';
                items.forEach(b => {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.textContent = b.title;
                    div.onclick = () => { const el = document.getElementById('book-' + b.id); if (el) el.setAttribute('position', '0 1.6 -1'); };
                    list.appendChild(div);
                });
            }

            renderList(books);
            const input = document.getElementById('search');
            input.addEventListener('input', () => {
                const q = input.value.trim().toLowerCase();
                const matches = books.filter(b => b.title.toLowerCase().includes(q));
                books.forEach(b => {
                    const el = document.getElementById('book-' + b.id);
                    if (!el) return;
                    const visible = q === '' || b.title.toLowerCase().includes(q);
                    el.setAttribute('visible', visible);
                });
                renderList(matches);
            });

        </script>
    </body>
</html>
